<!DOCTYPE html>
<html>
<head>
    <title>Fitness Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Fitness Chatbot Using Python</h1>

    <div class="section">
        <h2>User Fitness Profile</h2>

        <form action="/profile" method="POST">
            <input type="text" name="name" placeholder="Enter your name" required>
            <input type="number" name="age" placeholder="Enter your age" required>
            <input type="number" step="0.1" name="weight" placeholder="Enter weight in kg" required>
            <input type="number" step="0.1" name="height" placeholder="Enter height in cm" required>

            <select name="goal" required>
                <option value="">Select Goal</option>
                <option value="fat loss">Fat Loss</option>
                <option value="muscle gain">Muscle Gain</option>
                <option value="general fitness">General Fitness</option>
            </select>

            <button type="submit">Generate Plan</button>
        </form>

        {% if plan %}
        <div class="result">
            <h3>Your Fitness Plan</h3>
            <pre>{{ plan }}</pre>
        </div>
        {% endif %}
    </div>

    <div class="section">
        <h2>Chat With Fitness Bot</h2>

        <div id="chat-box"></div>

        <input type="text" id="user-input" placeholder="Ask about diet, workout, BMI...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("user-input");
    let message = input.value.trim();

    if (message === "") {
        return;
    }

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += "<div class='user'>You: " + message + "</div>";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(response => response.json())
    .then(data => {
        chatBox.innerHTML += "<div class='bot'>Bot: " + data.reply + "</div>";
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(error => {
        chatBox.innerHTML += "<div class='bot'>Bot: Error connecting to server.</div>";
    });
}
</script>

</body>
</html>
